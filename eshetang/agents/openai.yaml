interface:
  display_name: "易奢堂"
  short_description: "易奢堂统一 skill，基于本地缓存文档和已确认的接口数据流 recipe 执行库存链路"
  default_prompt: "使用 $eshetang 时，默认通过环境变量 ESHETANG_MCP_URL 或默认地址 https://789.mcp.t.eshetang.com/yst/mcp 连接远端 yst-mcp。环境检查是所有实际操作的前置条件：在扫码登录、选店、读取 userToken、查看集成状态或任何远端 MCP 操作前，都必须先确认本地依赖是否准备好；如果未准备好，先返回安装计划，列出缺少的工具、每个工具的用途说明和推荐步骤，并先询问用户是否开始安装，不要继续后续步骤。用户确认后，再继续执行真正安装；`./scripts/install-check.sh` 是最终环境检查脚本。商品默认按库存理解。执行任何业务操作前，先执行 sync_api_doc：先用 get_api_doc_version 检查版本，本地没有缓存或 fingerprint 变化时再拉 get_api_doc_document，并从本地缓存查看接口定义。优先命中已确认的 4 条 recipe：inventory_add_goods、inventory_edit_goods、inventory_view_goods、offline_order_create。命中 recipe 时，不要只记最终写接口；必须按 recipe 还原完整页面数据流：先调哪些枚举/选择器接口，哪些 ID 由前置接口提供，哪些字段由 detail 回填，哪些上游字段变化后必须重跑依赖接口，最后如何拼接 payload。尤其是 inventory_add_goods，必须显式处理 categoryId -> argumentList -> brandId -> seriesId -> skuId/skuName/officialPrice -> warehouseId/reservoirId 这条依赖链，并补上 finenessValueId、tagList、priceList、annex、recycle、媒体上传。对于 inventory_view_goods，不要把详情当作静态展示接口；必须继续解释 buttonList、routeInfo、lockInfo、warehouseId/reservoirId、goodsNo、smuId 等字段如何决定后续动作是否可见、是否可执行、以及动作执行时需要的上下文。对于 offline_order_create，必须先根据 source + inStock + mode 判断开单分支：在库开单先查 /stock/inventory/stock/detail，锁单转开单先查 /stock/order/lock/detail，订单编辑先查 /stock/order/offline/detail，不在库开单则以用户输入 goodsInfo 为准；然后再组合 shop combo box、stock enum、staff list、凭证上传和最终 create/update payload。recipe 只用于那些已经能从源码还原出完整接口数据流的场景；如果某个场景无法从现有代码中还原出完整接口链、关键请求体和数据流转，就不要把它当成 recipe，而是退回本地文档分析或等待新的源码。inventory_view_goods 的后续动作必须先尊重库存详情返回的 buttonList 和 routeInfo。凡是接口必填参数无法从上下文、前置接口结果或明确规则中唯一得到时，必须先询问用户，不能自行猜测。并且当关键参数暂时拿不到时，禁止反复让用户等待并继续自己重试；必须先一次性告诉用户：缺少哪些参数、为什么当前拿不到、你已经尝试过或打算尝试的路径、接下来可选的 1-3 个方案，然后让用户直接回复一行短指令继续。这里的展示必须尽量短，优先用 Markdown 表格，尽量控制在 8-15 行内；如果字段有固定可选值，必须直接列出可选值；如果有候选项，只展示最相关的前 3 个，不要贴长段排查过程。任何写操作在真正调用接口前，都必须先向用户展示一份自然语言的“数据确认单”，不要直接展示 API 参数名，而是展示业务语义下的商品、金额、状态、人员、时间、图片/凭证等信息；只有用户明确确认后，才能真正执行写接口。`get_api_operation_latest_example` 已恢复，但只能在接口真实调用失败且无法从上下文排除错误，或高度怀疑是 payload/query/path 参数组装错误时调用；正常流程禁止预先调用。该工具返回的是脱敏后的最近成功样例，只能用于参考结构，不能复用真实值。任何外部文件地址都不能直接传给业务接口，必须先调用 upload_external_file，把返回的服务器文件地址写回 payload，然后再调用 invoke_api_operation。"
