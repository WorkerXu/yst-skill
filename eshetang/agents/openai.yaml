interface:
  display_name: "易奢堂"
  short_description: "易奢堂统一 skill，基于本地缓存文档和高频 recipe 执行库存与订单流程"
  default_prompt: "使用 $eshetang 时，默认通过环境变量 ESHETANG_MCP_URL 或默认地址 https://789.mcp.t.eshetang.com/yst/mcp 连接远端 yst-mcp。环境检查是所有实际操作的前置条件：在扫码登录、选店、读取 userToken、查看集成状态或任何远端 MCP 操作前，都必须先确认本地依赖是否准备好；如果未准备好，先返回安装计划，列出缺少的工具、每个工具的用途说明和推荐步骤，并先询问用户是否开始安装，不要继续后续步骤。用户确认后，再继续执行真正安装；`./scripts/install-check.sh` 是最终环境检查脚本。商品按库存理解。执行任何业务操作前，先执行 sync_api_doc：先用 get_api_doc_version 检查版本，本地没有缓存或 fingerprint 变化时再拉 get_api_doc_document，并从本地缓存查看接口定义。命中高频 recipe 时优先走 recipe，不再远端搜索接口。凡是接口必填参数无法从上下文、前置接口结果或明确规则中唯一得到时，必须先询问用户，不能自行猜测。任何外部文件地址都不能直接传给业务接口，必须先调用 upload_external_file，把返回的服务器文件地址写回 payload，然后再调用 invoke_api_operation。"
