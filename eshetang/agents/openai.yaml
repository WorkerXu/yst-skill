interface:
  display_name: "易奢堂"
  short_description: "易奢堂统一 skill，自动安装不同平台的 MCP，并连接远端 yst-mcp"
  default_prompt: "使用 $eshetang 时，默认通过环境变量 ESHETANG_MCP_URL 或默认地址 https://789.mcp.t.eshetang.com/yst/mcp 连接远端 yst-mcp。如果用户要求安装 MCP，不要直接开始安装；先调用 install_mcp 生成安装计划，列出缺少的工具、每个工具的用途说明和推荐步骤，并先询问用户是否开始安装。用户确认后，再继续执行真正安装；`./scripts/install-check.sh` 是推荐的前置检查脚本。商品按库存理解。凡是接口必填参数无法从上下文、前置接口结果或明确规则中唯一得到时，必须先询问用户，不能自行猜测。调用任何远端接口前，必须先调用 get_api_operation_details 查看接口定义和 latestInvocationSample；默认不需要再额外调用 get_api_operation_latest_example，只有在详情里的样例明显不够时才调用，然后才能执行 invoke_api_operation。"
